extends: default.yaml

runtime:
  device: cuda
  gpu_required: true
  recommended_gpu:
    - L4
    - T4
  recommended_ram: high

llm:
  method: B3_local_llm_qwen3_8b
  model_id: Qwen/Qwen3-8B
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 384
  sample_rows: 5
  seed: 42
  batch_size: 1
  quantization: 4bit
  enable_thinking: false
  stop_after_json: true
